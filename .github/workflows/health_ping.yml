name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      BACKEND_HEALTH_URL: https://examguard-backend-t2pv.onrender.com/health
    steps:
      - name: Health check
        run: curl --fail --show-error --silent "$BACKEND_HEALTH_URL"
